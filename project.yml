name: AIStudio
options:
  deploymentTarget:
    iOS: '16.0'
  createIntermediateGroups: true
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: '5.0'
    IPHONEOS_DEPLOYMENT_TARGET: '16.0'
packages:
  ApphudSDK:
    url: https://github.com/apphud/ApphudSDK
    from: 3.3.0
targets:
  AIStudio:
    type: application
    platform: iOS
    deploymentTarget: '16.0'
    sources:
      - path: AIStudio
        excludes:
          - "Resources/AIStudio.storekit"
          - "Support/Secrets.example.swift"
      # Kept in the project (for the scheme's StoreKit config) but out of any build phase.
      - path: AIStudio/Resources/AIStudio.storekit
        buildPhase: none
    dependencies:
      - package: ApphudSDK
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.labs.fviu
        INFOPLIST_FILE: AIStudio/App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: '1'
        SWIFT_VERSION: '5.0'
        ASSETCATALOG_COMPILER_APPICON_NAME: ''
schemes:
  AIStudio:
    build:
      targets:
        AIStudio: all
    run:
      config: Debug
      # Local StoreKit testing for purchases (Debug). Fill product ids — see README.
      storeKitConfiguration: AIStudio/Resources/AIStudio.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
